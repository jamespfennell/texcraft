                const scs = getComputedStyle(document.getElementById("output-scroll"));
                const needed =
                    document.getElementById("sheet").offsetWidth +
                    parseFloat(scs.paddingLeft) +
                    parseFloat(scs.paddingRight) +
                    8;
                const pct = Math.max(28, Math.min(60, 100 * (1 - needed / available)));
                document.getElementById("controls").style.flex = `0 0 ${pct}%`;
            }

            {
                const divider = document.getElementById("divider");
                const controlsPanel = document.getElementById("controls");
                const mainEl = document.querySelector("main");
                let currentPct = null;

                const setSplit = (pct) => {
                    controlsPanel.style.flex = `0 0 ${pct}%`;
                };
                const saved = Number(localStorage.getItem("split"));
                if (saved >= 20 && saved <= 80) setSplit(saved);

                divider.addEventListener("pointerdown", (e) => {
                    e.preventDefault();
                    divider.setPointerCapture(e.pointerId);
                    divider.classList.add("dragging");
                    document.body.style.userSelect = "none";
                });
                divider.addEventListener("pointermove", (e) => {
                    if (!divider.hasPointerCapture(e.pointerId)) return;
                    const cs = getComputedStyle(mainEl);
                    const rect = mainEl.getBoundingClientRect();
                    const left = rect.left + parseFloat(cs.paddingLeft);
                    const width =
                        rect.width -
                        parseFloat(cs.paddingLeft) -
                        parseFloat(cs.paddingRight);
                    currentPct = Math.max(
                        20,
                        Math.min(80, ((e.clientX - left) / width) * 100),
                    );
                    setSplit(currentPct);
                });
                divider.addEventListener("pointerup", (e) => {
                    divider.releasePointerCapture(e.pointerId);
                    divider.classList.remove("dragging");
                    document.body.style.userSelect = "";
                    // Persist once per drag, not on every move.
                    if (currentPct !== null) {
                        localStorage.setItem("split", currentPct.toFixed(1));
                    }
                });
                divider.addEventListener("dblclick", () => {
                    localStorage.removeItem("split");
                    currentPct = null;
                    autoFitSplit();
                });
            }

            // ── Draggable right margin (\hsize) ────────────────────────────

            // Listeners live on the sheet, which survives re-renders; the
            // margin-handle rect inside the SVG is rebuilt on every render.
            {
                const sheet = document.getElementById("sheet");
                let drag = null; // { startX, startWidthPt }

                sheet.addEventListener("pointerover", (e) => {
                    sheet.classList.toggle(
                        "margin-hover",
                        !!e.target.closest?.(".margin-grab"),
                    );
                });
                sheet.addEventListener("pointerleave", () => {
                    sheet.classList.remove("margin-hover");
                });
                sheet.addEventListener("pointerdown", (e) => {
                    if (!e.target.closest?.(".margin-grab")) return;
                    e.preventDefault();
                    sheet.setPointerCapture(e.pointerId);
                    drag = { startX: e.clientX, startWidthPt: Number(widthNumber.value) };
                    sheet.classList.add("margin-dragging");
                    document.body.style.userSelect = "none";
                });
                sheet.addEventListener("pointermove", (e) => {
                    if (!drag) return;
                    const dPt = (e.clientX - drag.startX) / PX_PER_PT;
                    const before = Number(widthNumber.value);
                    if (setWidth(drag.startWidthPt + dPt) !== before) render();
                });
                const endDrag = () => {
                    if (!drag) return;
                    drag = null;
                    sheet.classList.remove("margin-dragging");
                    document.body.style.userSelect = "";
                };
                sheet.addEventListener("pointerup", endDrag);
                sheet.addEventListener("pointercancel", endDrag);
            }

            // ── Element info row ───────────────────────────────────────────

            // Hovering an element of the typeset output shows its details in
            // the row under the output header, instead of a floating tooltip.
            const elementInfoEl = document.getElementById("element-info");
            const INFO_PLACEHOLDER = "hover over the output to inspect its elements";

            function setElementInfo(text) {
                elementInfoEl.classList.toggle("placeholder", !text);
                // The hover hint only makes sense when there is output to
                // hover over.
                const hint = outputSvg.firstChild ? INFO_PLACEHOLDER : "";
                elementInfoEl.textContent = text
                    ? text.replaceAll("\n", " · ")
                    : hint;
            }

            outputSvg.addEventListener("mouseover", (e) => {
                const target = e.target.closest?.("[data-info]");
                if (target) setElementInfo(target.dataset.info);
            });
            outputSvg.addEventListener("mouseout", (e) => {
                if (e.target.closest?.("[data-info]")) setElementInfo("");
            });
            setElementInfo("");

            // ── Tooltips ───────────────────────────────────────────────────

            const tooltipEl = document.getElementById("tooltip");

            function showTooltip(target) {
                tooltipEl.textContent = target.dataset.tooltip;
                tooltipEl.style.display = "block";
                const r = target.getBoundingClientRect();
                const maxLeft = window.innerWidth - tooltipEl.offsetWidth - 12;
                tooltipEl.style.left = Math.max(0, Math.min(r.left, maxLeft)) + "px";
                // Below the target, flipping above when it would run off
                // the bottom of the viewport.
                let top = r.bottom + 6;
                if (top + tooltipEl.offsetHeight > window.innerHeight - 4) {
                    top = Math.max(4, r.top - tooltipEl.offsetHeight - 6);
                }
                tooltipEl.style.top = top + "px";
            }

            function hideTooltip() {
                tooltipEl.style.display = "none";
            }

            document.addEventListener("mouseover", (e) => {
                const target = e.target.closest?.("[data-tooltip]");
                if (target) showTooltip(target);
                else hideTooltip();
            });

            // Keyboard: focusing a control shows the tooltip of its label
            // (or of the control itself, if it carries one).
            document.addEventListener("focusin", (e) => {
                const target =
                    e.target.closest?.("[data-tooltip]") ??
                    [...(e.target.labels ?? [])].find((l) => l.dataset.tooltip);
                if (target) showTooltip(target);
                else hideTooltip();
            });
            document.addEventListener("focusout", hideTooltip);

            // ── Init ───────────────────────────────────────────────────────

            loadFromURL();
            render();
            // A saved split wins; otherwise fit the sheet.
            if (!localStorage.getItem("split")) autoFitSplit();
        </script>
    </body>
</html>
