<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>knuthplass.dev</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=JetBrains+Mono:wght@400;600&display=swap"
            rel="stylesheet"
        />
        <style>
            /* Latin Modern is used only inside the galley — it is the one
               font Boxworks supports today, not a branding choice. */
            @font-face {
                font-family: "Latin Modern Roman";
                src: url("./fonts/lmroman10-regular.otf") format("opentype");
                font-display: swap;
            }

            /* Paper background with teal-ink accent — the sibling sites own
               other hues (ligkern.dev: indigo, hyphenate.dev: forest green). */
            :root {
                --bg: #f6f1ea;
                --surface: #ffffff;
                --text: #243330;
                --muted: #4f5e5a;
                --accent: #0f766e;
                --accent-strong: #094f4a;
                --separator: #b5cec7;
                /* Teal fill for engaged toggle chips — the palette's mid
                   teal (same as --separator), dark enough to stand off the
                   paper, light enough for ink text. */
                --chip-bg: #b5cec7;

                /* Vivid overlay colors: kerns are green (positive) and red
                   (negative); glue amber; ligatures indigo. */
                --glue-fill: #f59e0b;
                --kern-pos-fill: #16a34a;
                --kern-neg-fill: #dc2626;
                --lig-fill: #6366f1;
                --error-text: #c0392b;

                --sans: "Inter", sans-serif;
                --mono: "JetBrains Mono", monospace;
            }

            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                background-color: var(--bg);
                color: var(--text);
                font-family: var(--sans);
                height: 100vh;
                overflow: hidden;
                display: flex;
                flex-direction: column;
            }

            :focus-visible {
                outline: 2px solid var(--accent);
                outline-offset: 1px;
            }

            /* ── Header ── */

            /* Header and panels run flush to the browser edges; the divider
               line runs from the dark masthead band to the bottom edge. */
            header {
                display: flex;
                align-items: center;
                gap: 1rem;
                padding: 0.85rem 1.25rem 0.6rem;
                background: var(--accent);
                color: #f6f1ea;
            }

            #attribution {
                margin-left: auto;
                font-size: 0.85rem;
            }

            #attribution a {
                color: inherit;
                text-decoration: underline;
                text-underline-offset: 2px;
            }

            h1 {
                font-size: 1.75rem;
                font-weight: 400;
                color: #ffffff;
                cursor: pointer;
            }

            #tagline {
                font-size: 0.85rem;
                color: inherit;
            }

            /* ── Split layout ── */

            main {
                flex: 1;
                min-height: 0;
                display: flex;
            }

            /* The controls sit directly on the paper background — no card.
               Structure comes from section heads and hairline rules. */
            #controls {
                flex: 1 1 0;
                min-width: 0;
                overflow-y: auto;
                padding: 1rem 1rem 1.25rem 1.25rem;
                display: flex;
                flex-direction: column;
                gap: 1.4rem;
            }

            /* The divider is the 1px teal line itself, so both panels (and
               the controls scrollbar) run flush up to it. It darkens while
               resizing. */
            #divider {
                flex: 0 0 1px;
                cursor: col-resize;
                position: relative;
                touch-action: none;
                background: var(--accent);
            }

            #divider:hover,
            #divider.dragging {
                background: var(--accent-strong);
            }

            /* Invisible grab area beyond the 1px line, biased toward the
               galley side so it never covers the controls scrollbar. */
            #divider::before {
                content: "";
                position: absolute;
                top: 0;
                bottom: 0;
                left: -4px;
                right: -14px;
            }

            #output-panel {
                flex: 1 1 0;
                min-width: 0;
                min-height: 0;
                padding-top: 1rem;
                display: flex;
                flex-direction: column;
            }

            .section-label {
                font-size: 0.7rem;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.07em;
                color: var(--accent);
                margin-bottom: 0.45rem;
            }

            /* Variant for a section label used inline in a flex row. */
            .section-label.inline {
                margin: 0;
            }

            /* Shrink-wrap a label so its tooltip underline hugs the text. */
            .section-label.fit {
                width: fit-content;
            }

            #param-groups {
                display: flex;
                flex-direction: column;
                gap: 0.5rem;
            }

            /* ── Controls ── */

            /* The input is prose, not code: set it in the UI face. */
            #text-input {
                font-size: 0.88rem;
                font-family: var(--sans);
                line-height: 1.5;
                width: 100%;
                min-height: 16rem;
                padding: 0.5rem 0.75rem;
                border: 1px solid var(--separator);
                border-radius: 0;
                background: var(--surface);
                color: var(--text);
                resize: vertical;
            }

            #text-input:focus-visible {
                outline-offset: -1px;
            }

            #width-row {
                display: flex;
                align-items: center;
                gap: 0.6rem;
                font-size: 0.85rem;
            }

            #width-slider {
                flex: 1;
                accent-color: var(--accent);
            }

            #width-number {
                width: 4.5rem;
            }

            /* Parameter groups are flat and always open: a subhead over a
               hairline rule, then the grid. */
            .param-group-title {
                font-size: 0.78rem;
                font-weight: 600;
                color: var(--text);
                border-bottom: 1px solid var(--separator);
                padding-bottom: 0.3rem;
                margin-bottom: 0.55rem;
            }

            .param-grid {
                display: grid;
                grid-template-columns: auto 1fr 4.5rem;
                align-items: center;
                gap: 0.45rem 0.75rem;
                padding: 0 0 0.25rem;
            }

            .param-grid label {
                font-size: 0.82rem;
                font-family: var(--mono);
            }

            /* Scale rows occupy only the slider column; make sure the next
               parameter still starts on a fresh row. */
            .param-grid label:not(.checkbox-row) {
                grid-column: 1;
            }

            .param-grid label.disabled {
                opacity: 0.45;
            }

            .param-slider {
                width: 100%;
                min-width: 0;
            }

            /* Custom slider styling: the native thumb draws a drop shadow in
               some browsers. The teal progress fill is painted from JS as a
               background gradient (paintSliders). */
            input[type="range"] {
                -webkit-appearance: none;
                appearance: none;
                height: 4px;
                border-radius: 2px;
                background: var(--separator);
                outline: none;
                cursor: pointer;
            }

            input[type="range"]::-webkit-slider-thumb {
                -webkit-appearance: none;
                appearance: none;
                width: 14px;
                height: 14px;
                border-radius: 50%;
                border: none;
                background: var(--accent);
                box-shadow: none;
            }

            input[type="range"]::-moz-range-thumb {
                width: 14px;
                height: 14px;
                border-radius: 50%;
                border: none;
                background: var(--accent);
                box-shadow: none;
            }

            input[type="range"]:disabled {
                cursor: default;
            }

            /* Tick labels (min / zero / max) above a run of sliders that
               share a scale; occupies the slider column of the grid. */
            .slider-scale {
                grid-column: 2;
                position: relative;
                height: 1.35rem;
                font-size: 0.66rem;
                font-family: var(--mono);
                color: var(--text);
                margin-bottom: -0.35rem;
            }

            .slider-scale span {
                position: absolute;
                bottom: 0.32rem;
                transform: translateX(-50%);
                white-space: nowrap;
            }

            /* Tick line under each label, at the exact track position. */
            .slider-scale span::after {
                content: "";
                position: absolute;
                top: 100%;
                left: 50%;
                width: 1px;
                height: 0.28rem;
                background: currentColor;
            }

            .slider-scale span.tick-left::after {
                left: 0;
            }

            .slider-scale span.tick-right::after {
                left: auto;
                right: 0;
            }

            .slider-scale span.tick-left {
                left: 0;
                transform: none;
            }

            .slider-scale span.tick-right {
                right: 0;
                left: auto;
                transform: none;
            }

            .param-slider:disabled {
                opacity: 0.45;
            }

            .param-grid input[type="number"] {
                width: 100%;
            }

            .param-grid input:disabled {
                opacity: 0.45;
            }

            .param-glue-input {
                grid-column: 2 / 4;
                width: 100%;
            }

            .checkbox-row {
                grid-column: 1 / 4;
                display: flex;
                align-items: center;
                gap: 0.4rem;
                font-size: 0.82rem;
                font-family: var(--mono);
                cursor: pointer;
                user-select: none;
            }

            .checkbox-row input {
                accent-color: var(--accent);
            }

            /* ── Tooltips ── */

            [data-tooltip] {
                text-decoration: underline dotted;
                text-underline-offset: 3px;
                cursor: help;
            }

            #tooltip {
                position: fixed;
                display: none;
                white-space: pre-line;
                background: var(--surface);
                color: var(--text);
                border: 1px solid var(--separator);
                padding: 0.5rem 0.65rem;
                font-size: 0.8rem;
                line-height: 1.45;
                max-width: 22rem;
                z-index: 10;
                pointer-events: none;
            }

            input[type="number"],
            input[type="text"] {
                font-family: var(--mono);
                font-size: 0.82rem;
                padding: 0.25rem 0.4rem;
                border: 1px solid var(--separator);
                border-radius: 0;
                background: var(--surface);
                color: var(--text);
            }

            input[type="number"]:focus-visible,
            input[type="text"]:focus-visible {
                outline-offset: -1px;
            }

            input.invalid {
                border-color: var(--error-text);
            }

            .modified {
                color: var(--accent);
                font-weight: 700;
            }

            #preset-row {
                display: flex;
                flex-wrap: wrap;
                align-items: baseline;
                gap: 0.5rem;
                font-size: 0.8rem;
                margin-bottom: 0.6rem;
            }

            .preset-btn {
                font-family: inherit;
                font-size: inherit;
                padding: 0;
                border: none;
                background: none;
                color: var(--text);
                cursor: pointer;
            }

            .preset-btn:hover {
                color: var(--accent);
            }

            .preset-btn.active {
                font-weight: 700;
            }

            .preset-sep {
                color: var(--separator);
            }

            /* ── Output ── */

            /* The rule under the header spans the full panel width,
               connecting to the divider on its left and the browser edge on
               its right. Everything below it is the white galley. */
            #output-header {
                display: flex;
                flex-direction: column;
                gap: 0.5rem;
                padding: 0 1.25rem 0.65rem 1rem;
                border-bottom: 1px solid var(--accent);
            }

            #overlay-toggles {
                display: flex;
                flex-wrap: wrap;
                gap: 0.4rem 0.5rem;
                font-size: 0.82rem;
                align-items: center;
            }

            /* Overlay toggles: no checkbox chrome. An enabled toggle gets a
               light teal chip — teal is this UI's "active" color — while a
               disabled one sits directly on the paper, showing a faint chip
               on hover. The swatches carry the overlay colors. */
            #overlay-toggles label {
                display: flex;
                align-items: center;
                gap: 0.35rem;
                cursor: pointer;
                user-select: none;
                position: relative;
                isolation: isolate;
                padding: 0.2rem 0.45rem;
            }

            /* The chip lives on a pseudo-element behind the content, so it
               can fade without dimming the text. */
            #overlay-toggles label::after {
                content: "";
                position: absolute;
                inset: 0;
                z-index: -1;
                border-radius: 3px;
                background: var(--chip-bg);
                opacity: 0;
            }

            /* Hover hint only on devices that actually hover, so a tap on
               a touch screen doesn't leave a half-lit chip behind. */
            @media (hover: hover) {
                #overlay-toggles label:hover::after {
                    opacity: 0.5;
                }
            }

            #overlay-toggles label:has(input:checked)::after {
                opacity: 1;
            }

            /* The real checkboxes stay in the DOM for keyboard use and the
               existing JS, but render invisibly. */
            #overlay-toggles input {
                position: absolute;
                opacity: 0;
                pointer-events: none;
            }

            #overlay-toggles label:has(input:focus-visible) {
                outline: 2px solid var(--accent);
                outline-offset: 2px;
            }

            .swatch {
                display: inline-block;
                width: 0.7rem;
                height: 0.7rem;
                border-radius: 2px;
            }

            /* The galley: the one white surface on the page, running from
               the header rule to the bottom and right browser edges. */
            #output-scroll {
                flex: 1;
                min-height: 0;
                overflow: auto;
                background: var(--surface);
                padding: 1.5rem 1.75rem;
            }

            /* Plain wrapper for the SVG; the margin-drag listeners live
               here because it survives re-renders. */
            #sheet {
                display: inline-block;
            }

            /* The right text margin of the sheet is draggable: grabbing the
               stop marker or the strip just outside the margin changes
               \hsize and the paragraph re-breaks live. The strip sits on
               the outside so it never shadows hover on line-final glyphs. */
            .margin-grab {
                cursor: col-resize;
            }

            .margin-handle {
                fill: transparent;
            }

            /* The margin stop and its width annotation match the other
               galley annotations (muted gray), darkening to ink while
               grabbed. */
            .margin-stop {
                fill: var(--muted);
            }

            /* The solid margin rule appears only while grabbing. */
            .margin-rule {
                stroke: transparent;
                stroke-width: 0.5;
            }

            #sheet.margin-hover .margin-stop,
            #sheet.margin-dragging .margin-stop,
            #sheet.margin-hover .margin-width-label,
            #sheet.margin-dragging .margin-width-label {
                fill: var(--text);
            }

            #sheet.margin-hover .margin-rule,
            #sheet.margin-dragging .margin-rule {
                stroke: var(--muted);
            }

            /* TeX's slug: the black rule marking an overfull line. */
            .overfull-rule {
                fill: var(--text);
            }

            /* The SVG's on-screen size is set explicitly in JS so that one
               TeX point always maps to the same number of pixels: changing
               the paragraph width reflows the text instead of zooming it.
               Oversized paragraphs scroll inside #output-scroll. The cursor
               is a plain arrow everywhere over the galley; the margin grab
               (col-resize) is the one exception, being a control. */
            #output-svg {
                display: block;
                cursor: default;
            }

            #output-svg text {
                font-family: "Latin Modern Roman", serif;
                font-kerning: none;
                font-feature-settings:
                    "liga" 0,
                    "clig" 0;
            }

            .glue-rect {
                fill: var(--glue-fill);
            }

            .kern-rect.positive {
                fill: var(--kern-pos-fill);
            }

            .kern-rect.negative {
                fill: var(--kern-neg-fill);
            }

            .kern-dot:hover {
                stroke: var(--text);
                stroke-width: 0.6;
            }

            .kern-dot.positive {
                fill: var(--kern-pos-fill);
            }

            .kern-dot.negative {
                fill: var(--kern-neg-fill);
            }

            .lig-rect {
                fill: var(--lig-fill);
            }

            /* Margin annotations, set like a compositor's proof marks. */
            .badness-label {
                font-family: "JetBrains Mono", monospace !important;
                fill: var(--muted);
            }

            #stats {
                font-family: var(--mono);
                font-size: 0.78rem;
                color: var(--text);
            }

            #stats:empty {
                display: none;
            }

            /* Details of the hovered output element; fixed height so the
               output below does not jump as the content changes. */
            #element-info {
                font-family: var(--mono);
                font-size: 0.78rem;
                min-height: 1.15rem;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            #element-info.placeholder {
                color: var(--text);
            }

            #output-svg .hover-target {
                fill: transparent;
            }

            /* Hovering an element highlights it; the hover layer sits on
               top of the glyphs, so a translucent fill reads as a
               highlighter stroke over the element. */
            #output-svg .hover-target:hover {
                fill: rgba(15, 118, 110, 0.18);
            }

            #output-error {
                font-size: 0.85rem;
                color: var(--error-text);
                margin-bottom: 0.75rem;
            }

            #output-error:empty {
                display: none;
            }

            /* ── Mobile ── */

            @media (max-width: 800px) {
                body {
                    height: auto;
                    min-height: 100vh;
                    overflow: auto;
                }

                main {
                    flex-direction: column;
                    min-height: 0;
                    gap: 1rem;
                }

                #divider {
                    display: none;
                }

                #controls,
                #output-panel {
                    flex: none !important;
                    overflow: visible;
                }

                #controls {
                    padding: 1rem 1.25rem;
                }

                /* With the divider hidden, both panels share the same left
                   edge as the controls above. */
                #output-header {
                    padding-left: 1.25rem;
                }

                #output-scroll {
                    flex: none;
                    min-height: 12rem;
                    padding: 1.5rem 1.25rem;
                }

                #tagline {
                    display: none;
                }
            }
        </style>
    </head>
    <body>
        <header>
            <h1>knuthplass.dev</h1>
            <span id="tagline">the Knuth-Plass line breaking algorithm as implemented in TeX</span>
            <span id="attribution">
                A <a href="https://github.com/jamespfennell/texcraft">Texcraft</a> project
            </span>
        </header>

        <main>
            <div id="controls">
                <div>
                    <div class="section-label">paragraph</div>
                    <textarea
                        id="text-input"
                        aria-label="paragraph text"
                        spellcheck="false"
                        autocomplete="off"
                        placeholder="type a paragraph…"
                    ></textarea>
                </div>

                <div>
                    <div
                        class="section-label fit"
                        data-tooltip="The line width the paragraph is broken to (TeX's \hsize). You can also drag the right margin of the typeset output."
                    >
                        width
                    </div>
                    <div id="width-row">
                        <input
                            type="range"
                            id="width-slider"
                            aria-label="line width in points"
                            min="72"
                            max="500"
                            step="1"
                        />
                        <input
                            type="number"
                            id="width-number"
                            aria-label="line width in points"
                            min="72"
                            max="500"
                            step="1"
                        />
                        <span>pt</span>
                    </div>
                </div>

                <div>
                    <div class="section-label">parameters</div>
                    <div id="preset-row">
                        standard settings:
                        <button class="preset-btn" data-preset="plain">plain TeX justified (default)</button>
                        <span class="preset-sep">|</span>
                        <button class="preset-btn" data-preset="ragged">ragged right</button>
                    </div>
                    <div id="param-groups"></div>
                </div>
            </div>

            <div id="divider"></div>

            <div id="output-panel">
                <div id="output-header">
                <div id="overlay-toggles">
                    <span class="section-label inline">show:</span>
                    <label>
                        <input type="checkbox" id="toggle-kerns" />
                        <span class="swatch" aria-hidden="true" style="background: var(--kern-pos-fill)"></span>
                        <span class="swatch" aria-hidden="true" style="background: var(--kern-neg-fill)"></span>
                        kerns
                    </label>
                    <label>
                        <input type="checkbox" id="toggle-ligs" />
                        <span class="swatch" aria-hidden="true" style="background: var(--lig-fill)"></span>
                        ligatures
                    </label>
                    <label>
                        <input type="checkbox" id="toggle-glue" />
                        <span class="swatch" aria-hidden="true" style="background: var(--glue-fill)"></span>
                        glue
                    </label>
                    <label>
                        <input type="checkbox" id="toggle-badness" checked />
                        badness
                    </label>
                    <label>
                        <input type="checkbox" id="toggle-glueset" checked />
                        glue set
                    </label>
                </div>
                <div id="stats"></div>
                <div id="element-info"></div>
                </div>
                <div id="output-scroll">
                    <div id="output-error"></div>
                    <div id="sheet">
                        <svg
                            id="output-svg"
                            xmlns="http://www.w3.org/2000/svg"
                            role="img"
                            aria-label="the typeset paragraph"
                        ></svg>
                    </div>
                </div>
            </div>
        </main>

        <div id="tooltip"></div>

        <script type="module">
            import init, { break_paragraph } from "./pkg/knuthplass_wasm.js";

            await init();

            // ── Parameter definitions ──────────────────────────────────────

            // Numeric params get a slider (log scale where the useful values
            // span orders of magnitude) plus an editable number. Descriptions
            // are shown as tooltips on the parameter names.
            const PARAM_GROUPS = [
                {
                    label: "Tolerance",
                    params: [
                        {
                            name: "pre_tolerance", def: 100, min: -1, max: 10000, log: true,
                            desc: "Badness tolerance for the first pass, which does not try hyphenation. If the paragraph cannot be broken within this tolerance, the second (hyphenating) pass runs. −1 makes the first pass always fail.",
                        },
                        {
                            name: "tolerance", def: 200, min: -1, max: 10000, log: true,
                            desc: "Badness tolerance for the second pass, in which hyphenation is attempted. If even this fails, a solution is forced and lines may be overfull.",
                        },
                        {
                            name: "looseness", def: 0, min: -3, max: 3,
                            desc: "Make the paragraph this many lines longer (+) or shorter (−) than optimal, if possible. Not yet implemented in Boxworks.",
                        },
                    ],
                },
                {
                    label: "Penalties",
                    params: [
                        {
                            name: "hyphen_penalty", def: 50, min: -10000, max: 10000, symlog: true,
                            desc: "Penalty for breaking the line at a hyphenation point. 10000 prevents hyphenation entirely; negative values encourage it.",
                        },
                        {
                            name: "ex_hyphen_penalty", def: 50, min: -10000, max: 10000, symlog: true,
                            desc: "Penalty for breaking after an explicit hyphen already present in the text, as in “so-called”.",
                        },
                        {
                            name: "line_penalty", def: 10, min: -10000, max: 10000, symlog: true,
                            desc: "Penalty charged for every line: raising it makes the algorithm prefer paragraphs with fewer lines.",
                        },
                        {
                            name: "broken_penalty", def: 100, min: -10000, max: 10000, symlog: true,
                            desc: "Penalty inserted after each hyphenated line, discouraging a page break right after it. Affects page breaking, not where lines break.",
                        },
                        {
                            name: "club_penalty", def: 150, min: -10000, max: 10000, symlog: true,
                            desc: "Penalty inserted after the first line, discouraging a page break that would orphan it. Affects page breaking, not where lines break.",
                        },
                        {
                            name: "final_widow_penalty", def: 150, min: -10000, max: 10000, symlog: true,
                            desc: "Penalty inserted before the last line (TeX’s \\widowpenalty), discouraging a page break that would widow it. Affects page breaking, not where lines break.",
                        },
                        {
                            name: "inter_line_penalty", def: 0, min: -10000, max: 10000, symlog: true,
                            desc: "Penalty inserted between every pair of lines, discouraging page breaks anywhere inside the paragraph.",
                        },
                    ],
                },
                {
                    label: "Demerits",
                    params: [
                        {
                            name: "adj_demerits", def: 10000, min: 0, max: 100000, log: true,
                            desc: "Extra demerits when consecutive lines have clashing looseness, e.g. a tight line right after a loose one.",
                        },
                        {
                            name: "double_hyphen_demerits", def: 10000, min: 0, max: 100000, log: true,
                            desc: "Extra demerits when two consecutive lines both end with hyphens.",
                        },
                        {
                            name: "final_hyphen_demerits", def: 5000, min: 0, max: 100000, log: true,
                            desc: "Extra demerits when the second-to-last line ends with a hyphen.",
                        },
                    ],
                },
                {
                    label: "Glue",
                    params: [
                        {
                            name: "left_skip", def: "0pt", glue: true,
                            desc: "Glue added at the left of every line, in TeX glue syntax. Try “0pt plus 20pt” for ragged-left text.",
                        },
                        {
                            name: "right_skip", def: "0pt", glue: true,
                            desc: "Glue added at the right of every line. Try “0pt plus 20pt” for ragged-right text.",
                        },
                        {
                            name: "par_fill_skip", def: "0pt plus 1fil", glue: true,
                            desc: "Glue that finishes the paragraph’s last line. The default infinitely stretchable glue lets the last line end anywhere; “0pt” justifies the last line too.",
                        },
                        {
                            name: "space_skip", def: "0pt", glue: true,
                            desc: "Glue between words (TeX’s \\spaceskip). If zero (the default), the font’s own interword glue is used, modified by the space factor. Try “10pt plus 5pt minus 2pt” for wide spacing.",
                        },
                        {
                            name: "extra_space_skip", def: "0pt", glue: true,
                            desc: "Glue between sentences, i.e. after a period or other punctuation that sets the space factor to 2000 or more (TeX’s \\xspaceskip). If zero (the default), the interword glue is used with the font’s extra sentence spacing added.",
                        },
                    ],
                },
            ];

            // The TeX control sequence each parameter corresponds to, shown
            // in the parameter's tooltip. Labels use the boxworks names:
            // this site demonstrates the Knuth-Plass algorithm, not TeX.
            const TEX_NAMES = {
                pre_tolerance: "\\pretolerance",
                tolerance: "\\tolerance",
                looseness: "\\looseness",
                hyphen_penalty: "\\hyphenpenalty",
                ex_hyphen_penalty: "\\exhyphenpenalty",
                line_penalty: "\\linepenalty",
                broken_penalty: "\\brokenpenalty",
                club_penalty: "\\clubpenalty",
                final_widow_penalty: "\\widowpenalty",
                inter_line_penalty: "\\interlinepenalty",
                adj_demerits: "\\adjdemerits",
                double_hyphen_demerits: "\\doublehyphendemerits",
                final_hyphen_demerits: "\\finalhyphendemerits",
                left_skip: "\\leftskip",
                right_skip: "\\rightskip",
                par_fill_skip: "\\parfillskip",
                space_skip: "\\spaceskip",
                extra_space_skip: "\\xspaceskip",
            };

            const DEFAULT_TEXT =
                "The next year there were many victories. The mountain that was beyond the valley and the hillside where the chestnut forest grew was captured and there were victories beyond the plain on the plateau to the south and we crossed the river in August and lived in a house in Gorizia that had a fountain and many thick shady trees in a walled garden and a wistaria vine purple on the side of the house. Now the fighting was in the next mountains beyond and was not a mile away. The town was very nice and our house was very fine. The river ran behind us and the town had been captured very handsomely but the mountains beyond it could not be taken and I was very glad the Austrians seemed to want to come back to the town some time, if the war should end, because they did not bombard it to destroy it but only a little in a military way. People lived on in it and there were hospitals and cafes and artillery up side streets and two bawdy houses, one for troops and one for officers, and with the end of the summer, the cool nights, the fighting in the mountains beyond the town, the shell-marked iron of the railway bridge, the smashed tunnel by the river where the fighting had been, the trees around the square and the long avenue of trees that led to the square; these with there being girls in the town, the King passing in his motor car, sometimes now seeing his face and little long necked body and gray beard like a goat's chin tuft; all these with the sudden interiors of houses that had lost a wall through shelling, with plaster and rubble in their gardens and sometimes in the street, and the whole thing going well on the Carso made the fall very different from the last fall when we had been in the country. The war was changed too.";
            const DEFAULT_WIDTH = 300;
            const WIDTH_MIN = 72;
            const WIDTH_MAX = 500;
            const FONT_SIZE_PT = 10;

            // ── DOM refs ───────────────────────────────────────────────────

            const textInput = document.getElementById("text-input");
            const widthSlider = document.getElementById("width-slider");
            const widthNumber = document.getElementById("width-number");
            const paramGroupsEl = document.getElementById("param-groups");
            const outputSvg = document.getElementById("output-svg");
            const outputError = document.getElementById("output-error");
            const toggles = {
                kerns: document.getElementById("toggle-kerns"),
                ligs: document.getElementById("toggle-ligs"),
                glue: document.getElementById("toggle-glue"),
                badness: document.getElementById("toggle-badness"),
                glueset: document.getElementById("toggle-glueset"),
            };
            const statsEl = document.getElementById("stats");

            // ── Build parameter inputs ─────────────────────────────────────

            const paramInputs = {}; // name -> {input, slider?, label, def, glue, spec}
            let forceHyphInput; // assigned while building the Tolerance group

            // Log-scale sliders use positions 0..SLIDER_STEPS mapped
            // exponentially onto [min, max]; linear sliders use the value
            // directly.
            const SLIDER_STEPS = 1000;

            function valueToPos(spec, value) {
                const clamped = Math.min(Math.max(value, spec.min), spec.max);
                if (spec.symlog) {
                    // Log-scale magnitude on both sides of zero; assumes
                    // max == -min. Position range is -SLIDER_STEPS..SLIDER_STEPS.
                    return Math.round(
                        (Math.sign(clamped) *
                            SLIDER_STEPS *
                            Math.log(Math.abs(clamped) + 1)) /
                            Math.log(spec.max + 1),
                    );
                }
                if (!spec.log) return value;
                const range = spec.max - spec.min + 1;
                return Math.round(
                    (SLIDER_STEPS * Math.log(clamped - spec.min + 1)) / Math.log(range),
                );
            }

            function posToValue(spec, pos) {
                if (spec.symlog) {
                    const magnitude =
                        Math.round(
                            Math.exp((Math.abs(pos) / SLIDER_STEPS) * Math.log(spec.max + 1)),
                        ) - 1;
                    return Math.sign(pos) * magnitude;
                }
                if (!spec.log) return pos;
                const range = spec.max - spec.min + 1;
                return spec.min + Math.round(Math.exp((pos / SLIDER_STEPS) * Math.log(range))) - 1;
            }

            function syncSliderToInput(name) {
                const e = paramInputs[name];
                if (!e.slider) return;
                const v = Number(e.input.value);
                if (Number.isFinite(v)) e.slider.value = valueToPos(e.spec, v);
            }

            // Where a value sits along the slider track, as a percentage.
            function valueToPercent(spec, value) {
                const pos = valueToPos(spec, value);
                if (spec.symlog) return ((pos + SLIDER_STEPS) / (2 * SLIDER_STEPS)) * 100;
                if (spec.log) return (pos / SLIDER_STEPS) * 100;
                return ((value - spec.min) / (spec.max - spec.min)) * 100;
            }

            function buildSliderScale(spec) {
                const scale = document.createElement("div");
                scale.className = "slider-scale";
                const ticks = [
                    [spec.min, 0],
                    [spec.max, 100],
                ];
                // Mark the zero point when it is not (visually at) an end.
                if (spec.min < 0 && spec.max > 0) {
                    const pct = valueToPercent(spec, 0);
                    if (pct > 10 && pct < 90) ticks.splice(1, 0, [0, pct]);
                }
                for (const [value, pct] of ticks) {
                    const tick = document.createElement("span");
                    tick.textContent = String(value).replace("-", "−");
                    if (pct === 0) tick.className = "tick-left";
                    else if (pct === 100) tick.className = "tick-right";
                    else tick.style.left = pct + "%";
                    scale.appendChild(tick);
                }
                return scale;
            }

            for (const group of PARAM_GROUPS) {
                const section = document.createElement("div");
                const title = document.createElement("div");
                title.className = "param-group-title";
                title.textContent = group.label;
                section.appendChild(title);
                const grid = document.createElement("div");
                grid.className = "param-grid";
                let scaleKey = null;
                for (const p of group.params) {
                    if (!p.glue) {
                        // A scale row above each run of sliders that share
                        // the same range and mapping.
                        const key = [!!p.symlog, !!p.log, p.min, p.max].join(":");
                        if (key !== scaleKey) {
                            grid.appendChild(buildSliderScale(p));
                            scaleKey = key;
                        }
                    }
                    const label = document.createElement("label");
                    label.textContent = p.name;
                    label.htmlFor = "param-" + p.name;
                    if (p.desc) {
                        label.dataset.tooltip = TEX_NAMES[p.name]
                            ? `${p.desc}\n\nTeX name: ${TEX_NAMES[p.name]}`
                            : p.desc;
                    }
                    grid.appendChild(label);

                    const input = document.createElement("input");
                    input.id = "param-" + p.name;
                    input.value = p.def;
                    if (p.glue) {
                        input.type = "text";
                        input.className = "param-glue-input";
                        input.addEventListener("input", () => {
                            markModified(p.name);
                            render();
                        });
                        grid.appendChild(input);
                        paramInputs[p.name] = { input, label, def: p.def, glue: true };
                    } else {
                        input.type = "number";
                        input.step = "1";
                        const slider = document.createElement("input");
                        slider.type = "range";
                        slider.className = "param-slider";
                        if (p.symlog) {
                            slider.min = -SLIDER_STEPS;
                            slider.max = SLIDER_STEPS;
                        } else if (p.log) {
                            slider.min = 0;
                            slider.max = SLIDER_STEPS;
                        } else {
                            slider.min = p.min;
                            slider.max = p.max;
                        }
                        slider.step = 1;
                        slider.value = valueToPos(p, p.def);
                        slider.addEventListener("input", () => {
                            input.value = posToValue(p, Number(slider.value));
                            markModified(p.name);
                            render();
                        });
                        input.addEventListener("input", () => {
                            syncSliderToInput(p.name);
                            markModified(p.name);
                            render();
                        });
                        grid.appendChild(slider);
                        grid.appendChild(input);
                        paramInputs[p.name] = { input, slider, label, def: p.def, spec: p };
                    }

                    if (p.name === "pre_tolerance") {
                        const row = document.createElement("label");
                        row.className = "checkbox-row";
                        row.dataset.tooltip =
                            "Sets pre_tolerance to −1, so the first (no-hyphenation) pass " +
                            "always fails and the hyphenating second pass always runs. " +
                            "This is the standard TeX idiom for forcing hyphenation.";
                        forceHyphInput = document.createElement("input");
                        forceHyphInput.type = "checkbox";
                        forceHyphInput.id = "force-hyphenation";
                        forceHyphInput.addEventListener("change", () => {
                            setForceHyphenation(forceHyphInput.checked);
                            render();
                        });
                        row.appendChild(forceHyphInput);
                        row.appendChild(document.createTextNode("force hyphenation"));
                        grid.appendChild(row);
                    }
                }

                section.appendChild(grid);
                paramGroupsEl.appendChild(section);
            }

            let preTolBeforeForce = null; // pre_tolerance value saved while forcing
            function setForceHyphenation(on) {
                forceHyphInput.checked = on;
                const e = paramInputs.pre_tolerance;
                if (on) {
                    if (preTolBeforeForce === null) preTolBeforeForce = e.input.value;
                    e.input.value = -1;
                } else if (preTolBeforeForce !== null) {
                    e.input.value = preTolBeforeForce;
                    preTolBeforeForce = null;
                }
                syncSliderToInput("pre_tolerance");
                markModified("pre_tolerance");
                e.input.disabled = on;
                e.slider.disabled = on;
                e.label.classList.toggle("disabled", on);
            }

            function markModified(name) {
                const p = paramInputs[name];
                p.label.classList.toggle("modified", String(p.input.value) !== String(p.def));
            }

            // ── State <-> URL ──────────────────────────────────────────────

            // Which overlays are on by default; only deviations are encoded
            // in the URL (as toggle name = "1" or "0").
            const TOGGLE_DEFAULTS = {
                kerns: false,
                ligs: false,
                glue: false,
                badness: true,
                glueset: true,
            };

            function encodeState() {
                const p = new URLSearchParams();
                if (textInput.value !== DEFAULT_TEXT) p.set("text", textInput.value);
                if (Number(widthNumber.value) !== DEFAULT_WIDTH) p.set("width", widthNumber.value);
                for (const [name, { input, def }] of Object.entries(paramInputs)) {
                    // While forcing hyphenation, pre_tolerance reads -1; encode
                    // the value it will revert to instead.
                    const v =
                        name === "pre_tolerance" && preTolBeforeForce !== null
                            ? preTolBeforeForce
                            : input.value;
                    if (String(v) !== String(def)) p.set(name, v);
                }
                if (forceHyphInput.checked) p.set("forcehyph", "1");
                for (const [name, def] of Object.entries(TOGGLE_DEFAULTS)) {
                    if (toggles[name].checked !== def) {
                        p.set(name, toggles[name].checked ? "1" : "0");
                    }
                }
                const qs = p.toString();
                history.replaceState(null, "", qs ? "?" + qs : location.pathname);
            }

            function loadFromURL() {
                const p = new URLSearchParams(location.search);
                textInput.value = p.get("text") ?? DEFAULT_TEXT;
                // Garbage or out-of-range widths fall back into range
                // instead of desyncing the controls.
                const w = Number(p.get("width") ?? DEFAULT_WIDTH);
                setWidth(Number.isFinite(w) ? w : DEFAULT_WIDTH);
                for (const [name, entry] of Object.entries(paramInputs)) {
                    if (p.has(name)) {
                        entry.input.value = p.get(name);
                        syncSliderToInput(name);
                        markModified(name);
                    }
                }
                if (p.get("forcehyph") === "1") setForceHyphenation(true);
                for (const name of Object.keys(TOGGLE_DEFAULTS)) {
                    const v = p.get(name);
                    if (v === "1") toggles[name].checked = true;
                    else if (v === "0") toggles[name].checked = false;
                }
            }

            // ── Run the algorithm ──────────────────────────────────────────

            function collectParams() {
                const params = { width_pt: Number(widthNumber.value) };
                let anyInvalid = false;
                for (const [name, { input, def, glue }] of Object.entries(paramInputs)) {
                    input.classList.remove("invalid");
                    if (String(input.value) === String(def)) continue;
                    if (glue) {
                        params[name] = input.value;
                    } else {
                        const v = Number(input.value);
                        if (!Number.isInteger(v)) {
                            input.classList.add("invalid");
                            anyInvalid = true;
                            continue;
                        }
                        params[name] = v;
                    }
                }
                return anyInvalid ? null : params;
            }

            function runBreaker() {
                const params = collectParams();
                if (params === null) {
                    return { error: "some parameter values are not valid integers" };
                }
                try {
                    return JSON.parse(break_paragraph(textInput.value, JSON.stringify(params)));
                } catch (e) {
                    // A wasm panic aborts the call as a RuntimeError. Known
                    // trigger: a dlmalloc bug in the Rust toolchain's wasm
                    // allocator, tripped by some non-ASCII inputs (see
                    // PLAN.md). Anything else is a bug in this file and
                    // should surface, not hide behind the generic message.
                    if (!(e instanceof WebAssembly.RuntimeError)) throw e;
                    return {
                        error:
                            "internal error while breaking the paragraph — " +
                            "try changing the text or reloading the page",
                    };
                }
            }

            // ── SVG rendering ──────────────────────────────────────────────

            const SVG_NS = "http://www.w3.org/2000/svg";

            // Fixed scale: the text stays the same size at every paragraph
            // width. True size would be 96/72.27 px per pt (1 TeX pt =
            // 1/72.27in, CSS defines 96px per inch); we render 1.5× that
            // for readability.
            const PX_PER_PT = (1.5 * 96) / 72.27;

            // Galley geometry, all in pt.
            const PAD = 4; // padding inside the viewBox on every side
            // Extra leading between lines (beyond what the algorithm
            // produced), giving the kern hover dots room to sit under the
            // lines they annotate.
            const LINE_EXTRA_PT = 4;
            const ANNOT_SIZE_PT = 5; // annotation font size
            const LABEL_CHAR_PT = 3; // JetBrains Mono advance (0.6em) at that size
            const COL_GAP = 8; // gap between annotation columns
            const MARGIN_GAP = 16; // clearance for the margin stop marker
            const HEADER_ROW_PT = 10; // header row above the first line
            const HEADER_BASELINE = -PAD - 5.5; // header text baseline
            const SLUG_PT = 5; // \overfullrule width in plain TeX
            const KERN_DOT_R = 2.5; // kern hover dot radius
            const STOP_HALF_W = 3.2; // margin stop half-width
            const STOP_H = 4.5; // margin stop height
            const HANDLE_W = 6.4; // margin drag strip width

            function svgEl(tag, attrs) {
                const el = document.createElementNS(SVG_NS, tag);
                for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
                return el;
            }

            // Compact pt formatting for tooltips and labels ("3.33", "1.5",
            // "0"), with a real minus sign for negative values.
            function fmtPt(v) {
                return String(Math.round(v * 100) / 100).replace("-", "−");
            }

            // A small muted-mono annotation label (margin columns, line
            // numbers, headers).
            function annotation(parent, x, y, text, attrs = {}) {
                const t = svgEl("text", {
                    class: "badness-label",
                    x,
                    y,
                    "font-size": ANNOT_SIZE_PT,
                    ...attrs,
                });
                t.textContent = text;
                parent.appendChild(t);
                return t;
            }

            function glueAmount(value, order) {
                return fmtPt(value) + (order ? order : "pt");
            }

            // before/after are the glyph elements surrounding a kern, used
            // to say which characters the kern sits between.
            function elementTooltip(el, before, after) {
                switch (el.type) {
                    case "char":
                        return `“${el.unicode}”\nwidth ${fmtPt(el.width_pt)}pt`;
                    case "lig":
                        return `ligature ${el.original} → ${el.unicode}\nwidth ${fmtPt(el.width_pt)}pt`;
                    case "kern": {
                        let where = "";
                        if (before && after) {
                            where = `\nbetween ${before.unicode} and ${after.unicode}`;
                        } else if (before) {
                            where = `\nafter ${before.unicode}`;
                        } else if (after) {
                            where = `\nbefore ${after.unicode}`;
                        }
                        return `kern ${fmtPt(el.width_pt)}pt${where}`;
                    }
                    case "glue": {
                        let spec = fmtPt(el.natural_pt) + "pt";
                        if (el.stretch_pt) spec += ` plus ${glueAmount(el.stretch_pt, el.stretch_order)}`;
                        if (el.shrink_pt) spec += ` minus ${glueAmount(el.shrink_pt, el.shrink_order)}`;
                        const delta = el.width_pt - el.natural_pt;
                        let action = "at natural width";
                        if (delta > 0.005) action = `stretched +${fmtPt(delta)}pt`;
                        else if (delta < -0.005) action = `shrunk −${fmtPt(-delta)}pt`;
                        return `glue ${spec}\nset to ${fmtPt(el.width_pt)}pt (${action})`;
                    }
                }
            }

            // With appearance: none the track loses its native progress
            // fill; paint it as a gradient up to the thumb position.
            function paintSliders() {
                for (const s of document.querySelectorAll('input[type="range"]')) {
                    const min = Number(s.min);
                    const pct = ((Number(s.value) - min) / (Number(s.max) - min)) * 100;
                    s.style.background = `linear-gradient(to right, var(--accent) ${pct}%, var(--separator) ${pct}%)`;
                }
            }

            function render() {
                paintSliders();
                updatePresetHighlight();
                outputError.textContent = "";
                statsEl.textContent = "";
                const result = runBreaker();
                encodeState();

                if (result.error) {
                    outputError.textContent = result.error;
                    outputSvg.replaceChildren();
                    // Errors from the wasm side are prefixed with the
                    // parameter name; mark that input as the culprit.
                    const named = result.error.match(/^([a-z_]+):/);
                    if (named && paramInputs[named[1]]) {
                        paramInputs[named[1]].input.classList.add("invalid");
                    }
                    setElementInfo("");
                    return;
                }

                const lines = result.lines;
                outputSvg.replaceChildren();
                if (lines.length === 0) {
                    if (textInput.value.trim()) {
                        outputError.textContent = "the algorithm produced no lines";
                    }
                    setElementInfo("");
                    return;
                }

                const width = Number(widthNumber.value);
                const last = lines[lines.length - 1];
                const totalHeight =
                    last.baseline_pt + last.depth_pt + lines.length * LINE_EXTRA_PT;
                // Margin annotation columns, sized to their content and
                // topped with a header row instead of per-row tooltips.
                const gluesetParts = lines.map((line) => {
                    const delta = line.elements.reduce(
                        (sum, el) =>
                            sum + (el.type === "glue" ? el.width_pt - el.natural_pt : 0),
                        0,
                    );
                    const detail =
                        line.glue_order === "normal"
                            ? Math.round(Math.abs(line.glue_ratio) * 100) + "%"
                            : line.glue_order;
                    return {
                        amount: (delta >= 0 ? "+" : "−") + fmtPt(Math.abs(delta)) + "pt",
                        detail: `(${detail})`,
                    };
                });
                // Overfull lines are beyond the badness scale; the column
                // says "inf" rather than the 1000000 sentinel.
                const badnessText = (line) =>
                    line.badness >= 1000000 ? "inf" : String(line.badness);
                const badnessCol = toggles.badness.checked
                    ? Math.max(
                          "badness".length,
                          ...lines.map((l) => badnessText(l).length),
                      ) * LABEL_CHAR_PT
                    : 0;
                // The glue-set column is two sub-columns: the pt adjustment,
                // right-aligned so every "pt" lines up, and the parenthesized
                // detail, left-aligned beside it.
                const gluesetAmountW =
                    Math.max(...gluesetParts.map((p) => p.amount.length)) *
                    LABEL_CHAR_PT;
                const gluesetDetailW =
                    Math.max(...gluesetParts.map((p) => p.detail.length)) *
                    LABEL_CHAR_PT;
                const gluesetCol = toggles.glueset.checked
                    ? Math.max(
                          "glue set".length * LABEL_CHAR_PT,
                          gluesetAmountW + LABEL_CHAR_PT + gluesetDetailW,
                      )
                    : 0;
                // Where each line's content ends (overfull lines carry
                // their slug past the right margin); the annotation columns
                // clear the widest line.
                const contentEnds = lines.map((line) =>
                    line.elements.reduce(
                        (end, el) => Math.max(end, el.x_pt + Math.max(el.width_pt, 0)),
                        0,
                    ),
                );
                const lineEnds = lines.map(
                    (line, i) =>
                        contentEnds[i] + (line.badness >= 1000000 ? SLUG_PT : 0),
                );
                const maxEndPt = Math.max(width, ...lineEnds);
                const badnessX = maxEndPt + MARGIN_GAP;
                const gluesetX = badnessX + (badnessCol ? badnessCol + COL_GAP : 0);
                let gutter = maxEndPt - width;
                if (badnessCol || gluesetCol) gutter += MARGIN_GAP;
                if (badnessCol) gutter += badnessCol;
                if (badnessCol && gluesetCol) gutter += COL_GAP;
                if (gluesetCol) gutter += gluesetCol;
                // Line-number gutter to the left of the text; numbers are
                // zero-padded to at least two digits (1 → 01).
                const numDigits = Math.max(2, String(lines.length).length);
                const leftGutter = numDigits * LABEL_CHAR_PT + COL_GAP;
                // HEADER_ROW_PT is always reserved (for the column headers
                // and the width annotation), so toggling the annotation
                // columns never shifts the paragraph vertically.
                const viewWidth = width + 2 * PAD + leftGutter + gutter;
                const viewHeight = totalHeight + 2 * PAD + HEADER_ROW_PT;
                outputSvg.setAttribute(
                    "viewBox",
                    `${-PAD - leftGutter} ${-PAD - HEADER_ROW_PT} ${viewWidth} ${viewHeight}`,
                );
                outputSvg.style.width = `${viewWidth * PX_PER_PT}px`;
                outputSvg.style.height = `${viewHeight * PX_PER_PT}px`;

                const overlays = svgEl("g", {});
                const textLayer = svgEl("g", { "font-size": FONT_SIZE_PT });
                // The hover layer sits on top of everything so tooltips work
                // regardless of which overlays are enabled.
                const hoverLayer = svgEl("g", {});
                outputSvg.appendChild(overlays);
                outputSvg.appendChild(textLayer);
                outputSvg.appendChild(hoverLayer);

                // Margin chrome: a stop marker at the right text margin,
                // like the margin stop of a typewriter. The grab strip sits
                // just outside the margin (so it never shadows hover on
                // line-final glyphs) and drags \hsize with the stop.
                const marginTop = -PAD - HEADER_ROW_PT;
                const chrome = svgEl("g", {});
                chrome.appendChild(
                    svgEl("polygon", {
                        class: "margin-stop margin-grab",
                        points: `${width - STOP_HALF_W},${marginTop} ${width + STOP_HALF_W},${marginTop} ${width},${marginTop + STOP_H}`,
                    }),
                );
                // Width annotation in the header row, ending just left of
                // the margin stop; updates live while dragging.
                annotation(
                    chrome,
                    width - STOP_HALF_W - 2.3,
                    HEADER_BASELINE,
                    `width: ${width}pt`,
                    {
                        class: "badness-label margin-width-label",
                        "font-weight": 600,
                        "text-anchor": "end",
                    },
                );
                chrome.appendChild(
                    svgEl("line", {
                        class: "margin-rule",
                        x1: width,
                        y1: marginTop + STOP_H,
                        x2: width,
                        y2: totalHeight + PAD,
                    }),
                );
                chrome.appendChild(
                    svgEl("rect", {
                        class: "margin-handle margin-grab",
                        x: width,
                        y: marginTop,
                        width: HANDLE_W,
                        height: viewHeight,
                    }),
                );
                outputSvg.appendChild(chrome);

                // The badness header right-aligns with its numbers; the
                // glue-set header spans its two sub-columns from the left.
                if (badnessCol) {
                    annotation(textLayer, badnessX + badnessCol, HEADER_BASELINE, "badness", {
                        "font-weight": 600,
                        "text-anchor": "end",
                    });
                }
                if (gluesetCol) {
                    annotation(textLayer, gluesetX, HEADER_BASELINE, "glue set", {
                        "font-weight": 600,
                    });
                }

                let totalBadness = 0;
                let overfullLines = 0;
                let hyphenatedLines = 0;

                for (const [lineIndex, line] of lines.entries()) {
                    const baseline = line.baseline_pt + lineIndex * LINE_EXTRA_PT;
                    const top = baseline - line.height_pt;
                    const boxHeight = line.height_pt + line.depth_pt;
                    // The last glyph of the line, for hyphenation counting.
                    let lastGlyph = null;
                    // The glyph a kern would attach to; unlike lastGlyph it
                    // resets at glue, so a kern after a space is never
                    // described as sitting "between" glyphs across it.
                    let prevGlyph = null;

                    for (const [elIndex, el] of line.elements.entries()) {
                        // Overlay geometry: negative kerns move the next glyph
                        // left, so their marker covers the overlapped region.
                        let hoverX = el.x_pt;
                        let hoverW = Math.max(Math.abs(el.width_pt), 0.6);
                        if (el.width_pt < 0) hoverX = el.x_pt + el.width_pt;

                        // For kerns, name the glyphs on either side.
                        const info =
                            el.type === "kern"
                                ? elementTooltip(
                                      el,
                                      prevGlyph,
                                      line.elements
                                          .slice(elIndex + 1)
                                          .find(
                                              (e) =>
                                                  e.type === "char" ||
                                                  e.type === "lig",
                                          ),
                                  )
                                : elementTooltip(el);

                        if (el.type === "char" || el.type === "lig") {
                            const t = svgEl("text", {
                                x: el.x_pt,
                                y: baseline,
                            });
                            t.textContent = el.unicode;
                            textLayer.appendChild(t);
                            lastGlyph = el;
                            prevGlyph = el;
                            if (el.type === "lig" && toggles.ligs.checked) {
                                // A thick underline beneath the ligature,
                                // rather than a wash over the glyph.
                                overlays.appendChild(
                                    svgEl("rect", {
                                        class: "lig-rect",
                                        x: el.x_pt,
                                        y: baseline + 1,
                                        width: el.width_pt,
                                        height: 2.6,
                                    }),
                                );
                            }
                        } else if (el.type === "kern") {
                            if (toggles.kerns.checked) {
                                // Kern markers are hair-thin; a dot under the
                                // line gives the kern a hoverable handle.
                                const dot = svgEl("circle", {
                                    class:
                                        "kern-dot " +
                                        (el.width_pt >= 0 ? "positive" : "negative"),
                                    // Centered under the marker rect (which
                                    // has a minimum width), touching its
                                    // bottom edge.
                                    cx: hoverX + hoverW / 2,
                                    cy: top + boxHeight + KERN_DOT_R,
                                    r: KERN_DOT_R,
                                });
                                dot.dataset.info = info;
                                hoverLayer.appendChild(dot);
                                overlays.appendChild(
                                    svgEl("rect", {
                                        class:
                                            "kern-rect " +
                                            (el.width_pt >= 0 ? "positive" : "negative"),
                                        x: hoverX,
                                        y: top,
                                        width: hoverW,
                                        height: boxHeight,
                                    }),
                                );
                            }
                        } else if (el.type === "glue") {
                            prevGlyph = null;
                            // Skip hover targets for degenerate glue (e.g. a
                            // zero \rightskip) that would just add noise.
                            if (
                                el.width_pt < 0.05 &&
                                !el.natural_pt &&
                                !el.stretch_pt &&
                                !el.shrink_pt
                            ) {
                                continue;
                            }
                            if (toggles.glue.checked && el.width_pt > 0) {
                                overlays.appendChild(
                                    svgEl("rect", {
                                        class: "glue-rect",
                                        x: el.x_pt,
                                        y: top,
                                        width: el.width_pt,
                                        height: boxHeight,
                                    }),
                                );
                            }
                        }

                        const hover = svgEl("rect", {
                            class: "hover-target",
                            x: hoverX,
                            y: top,
                            width: hoverW,
                            height: boxHeight,
                        });
                        hover.dataset.info = info;
                        hoverLayer.appendChild(hover);
                    }

                    annotation(
                        textLayer,
                        -COL_GAP,
                        baseline,
                        String(lineIndex + 1).padStart(numDigits, "0"),
                        { "text-anchor": "end" },
                    );

                    if (line.badness >= 1000000) {
                        overfullLines += 1;
                        // TeX's slug: a black rule appended after the
                        // protruding content of an overfull line
                        // (\overfullrule, 5pt in plain TeX).
                        const slug = svgEl("rect", {
                            class: "overfull-rule",
                            x: contentEnds[lineIndex],
                            y: top,
                            width: SLUG_PT,
                            height: boxHeight,
                        });
                        slug.dataset.info = `overfull line\ncontent exceeds the width by ${fmtPt(contentEnds[lineIndex] - width)}pt`;
                        textLayer.appendChild(slug);
                    } else {
                        totalBadness += line.badness;
                    }

                    if (toggles.badness.checked) {
                        annotation(textLayer, badnessX + badnessCol, baseline, badnessText(line), {
                            "text-anchor": "end",
                        });
                    }
                    if (toggles.glueset.checked) {
                        const { amount, detail } = gluesetParts[lineIndex];
                        annotation(textLayer, gluesetX + gluesetAmountW, baseline, amount, {
                            "text-anchor": "end",
                        });
                        annotation(
                            textLayer,
                            gluesetX + gluesetAmountW + LABEL_CHAR_PT,
                            baseline,
                            detail,
                        );
                    }

                    if (lastGlyph && lastGlyph.unicode === "-") hyphenatedLines += 1;
                }

                // passes === 1 means the first (no-hyphenation) pass
                // succeeded and hyphenation was never attempted.
                const hyphenation =
                    result.passes === 1
                        ? "hyphenation skipped"
                        : `${hyphenatedLines} hyphenated`;
                // Any overfull line puts the total beyond TeX's badness
                // scale, so report it as infinite (with the count) rather
                // than summing the remaining feasible lines.
                const badnessTotal =
                    overfullLines > 0
                        ? `infinite (${overfullLines} line${overfullLines === 1 ? "" : "s"} overfull)`
                        : totalBadness;
                statsEl.textContent =
                    `${lines.length} line${lines.length === 1 ? "" : "s"} · ` +
                    `${hyphenation} · total badness ${badnessTotal}`;
                setElementInfo("");
            }

            // ── Events ─────────────────────────────────────────────────────

            textInput.addEventListener("input", render);

            // The one place the width is written: clamps, syncs both
            // controls, and clears any stale invalid marker.
            function setWidth(pt) {
                const w = Math.round(
                    Math.max(WIDTH_MIN, Math.min(WIDTH_MAX, pt)),
                );
                widthNumber.value = w;
                widthSlider.value = w;
                widthNumber.classList.remove("invalid");
                return w;
            }

            widthSlider.addEventListener("input", () => {
                setWidth(Number(widthSlider.value));
                render();
            });

            // Out-of-range typing is marked invalid instead of silently
            // ignored (which used to leave the box and the galley showing
            // different widths).
            widthNumber.addEventListener("input", () => {
                const v = Number(widthNumber.value);
                if (Number.isFinite(v) && v >= WIDTH_MIN && v <= WIDTH_MAX) {
                    setWidth(v);
                    render();
                } else {
                    widthNumber.classList.add("invalid");
                }
            });

            for (const t of Object.values(toggles)) {
                t.addEventListener("change", render);
            }

            // ── Standard settings presets ──────────────────────────────────

            // Each preset gives every parameter a value: the plain TeX
            // default unless overridden here. "ragged" is plain TeX's
            // \raggedright macro (\rightskip=0pt plus2em \spaceskip=.3333em
            // \xspaceskip=.5em) with 1em = 10pt for cmr10.
            const PRESET_OVERRIDES = {
                plain: {},
                ragged: {
                    right_skip: "0pt plus 20pt",
                    space_skip: "3.33333pt",
                    extra_space_skip: "5pt",
                },
            };

            function presetValue(preset, name) {
                return String(PRESET_OVERRIDES[preset][name] ?? paramInputs[name].def);
            }

            function applyPreset(preset) {
                setForceHyphenation(false);
                for (const [name, { input }] of Object.entries(paramInputs)) {
                    input.value = presetValue(preset, name);
                    syncSliderToInput(name);
                    markModified(name);
                }
                render();
            }

            const presetBtns = document.querySelectorAll(".preset-btn");
            for (const btn of presetBtns) {
                btn.addEventListener("click", () => applyPreset(btn.dataset.preset));
            }

            // A preset is shown bold while every parameter has exactly its
            // value, so any manual edit un-bolds it. Called from render().
            function updatePresetHighlight() {
                for (const btn of presetBtns) {
                    const active = Object.entries(paramInputs).every(
                        ([name, e]) =>
                            String(e.input.value) === presetValue(btn.dataset.preset, name),
                    );
                    btn.classList.toggle("active", active);
                }
            }

            document.querySelector("h1").addEventListener("click", () => {
                textInput.value = DEFAULT_TEXT;
                setWidth(DEFAULT_WIDTH);
                applyPreset("plain");
            });

            // ── Draggable divider ──────────────────────────────────────────

            // Sizes the split so the whole sheet (and its margin
            // annotations) is visible without scrolling. Used on first load
            // and when the divider is double-clicked.
            function autoFitSplit() {
                const mainEl = document.querySelector("main");
                const cs = getComputedStyle(mainEl);
                const available =
                    mainEl.clientWidth -
                    parseFloat(cs.paddingLeft) -
                    parseFloat(cs.paddingRight) -
                    document.getElementById("divider").offsetWidth;
