<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>hyphenate.dev</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --bg: #f2f9f4;
                --surface: #ffffff;
                --surface-hover: #e8f4ec;
                --text: #0d2b1a;
                --accent: #2d6a4f;
                --separator: #a8cdb8;
                --hyphen: #2d6a4f;
                --score-break: #22a84a;
                --score-nobreak: #e03a3a;
            }

            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                background-color: var(--bg);
                color: var(--text);
                font-family: "Inter", sans-serif;
            }

            #hero {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 2.5rem;
                padding: 30vh 2rem 8rem;
            }

            h1 {
                font-size: 2rem;
                font-weight: 500;
                color: var(--accent);
                cursor: pointer;
            }

            .exp-box {
                width: fit-content;
                min-width: min(480px, 100%);
                margin: 0 auto;
                margin-bottom: 4rem;
                padding: 1.5rem 2rem;
                background-color: var(--surface);
                border-radius: 6px;
            }

            .exp-heading {
                font-size: 2rem;
                font-weight: 500;
                color: var(--accent);
                text-align: center;
                padding-bottom: 0.5rem;
            }

            .exp-description a {
                color: inherit;
                transition: opacity 0.15s;
            }

            .exp-description a:hover {
                opacity: 0.6;
            }

            .exp-description {
                font-size: 0.95rem;
                color: var(--text);
                text-align: center;
                line-height: 1.6;
                padding: 0.75rem 0 1.25rem;
                width: 0;
                min-width: 100%;
            }

            #word-input {
                font-size: 3rem;
                font-family: inherit;
                width: 100%;
                max-width: 480px;
                padding: 0.75rem 1.25rem;
                border: 2px solid var(--accent);
                border-radius: 6px;
                background-color: var(--surface);
                color: var(--text);
                text-align: center;
                outline: none;
                appearance: none;
            }

            #word-input:focus {
                border-color: var(--text);
            }

            #below-input {
                font-size: 3rem;
                color: var(--text);
                height: 1.2em;
                display: flex;
                align-items: flex-start;
                justify-content: center;
            }

            #below-input .hyphen {
                color: var(--hyphen);
            }

            #below-input .suggestions-row {
                display: flex;
                gap: 1.25rem;
                font-size: 1.2rem;
                margin-top: -1.5rem;
            }

            #attribution {
                position: fixed;
                bottom: 1rem;
                right: 1.25rem;
                font-size: 1rem;
                color: var(--text);
            }

            #attribution a {
                color: inherit;
                text-decoration: underline;
                text-underline-offset: 2px;
            }

            #explanation {
                margin: 0 auto;
                padding: 0 2rem;
            }

            .exp-grid {
                display: grid;
                align-items: center;
                justify-items: center;
                justify-content: center;
                row-gap: 0.15rem;
                margin: 0 auto;
            }

            .exp-sep {
                height: 1px;
                background: var(--separator);
                align-self: center;
            }

            .exp-word-char {
                font-size: 2rem;
                color: var(--text);
                padding: 0 0.15rem;
            }

            .exp-pattern-char {
                font-size: 2rem;
                color: var(--text);
                padding: 0 0.15rem;
            }

            .exp-score {
                font-size: 0.85rem;
                font-weight: 700;
                font-family: monospace;
                line-height: 1;
            }

            .exp-agg-score {
                font-size: 0.85rem;
                font-weight: 700;
                font-family: monospace;
                line-height: 1;
            }

            .exp-score-break {
                background-color: var(--score-break);
                color: white;
                border-radius: 50%;
                width: 1.4em;
                height: 1.4em;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .exp-score-nobreak {
                background-color: var(--score-nobreak);
                color: white;
                border-radius: 50%;
                width: 1.4em;
                height: 1.4em;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .exp-label {
                grid-column: 1 / -1;
                font-style: italic;
                color: var(--accent);
                font-size: 0.85rem;
                width: 100%;
                text-align: center;
                padding: 0.35rem 0;
            }

            .exp-pattern-text {
                font-family: monospace;
                font-size: 0.9rem;
                background-color: rgba(0, 0, 0, 0.08);
                border-radius: 6px;
                padding: 0.2em 0.5em;
                color: var(--text);
                white-space: nowrap;
                text-decoration: none;
            }

            .exp-pattern-text:hover {
                background-color: rgba(0, 0, 0, 0.16);
            }

            .exp-dot {
                font-size: 2rem;
                color: var(--text);
            }

            .exp-hyphen {
                font-size: 2rem;
                color: var(--hyphen);
            }

            .suggestion-chip {
                font-family: inherit;
                font-size: inherit;
                color: var(--text);
                background: none;
                border: none;
                padding: 0;
                cursor: pointer;
                text-decoration: underline;
            }

            .suggestion-chip:hover {
                opacity: 0.6;
            }
        </style>
    </head>
    <body>
        <div id="hero">
            <h1>hyphenate.dev</h1>
            <input
                id="word-input"
                type="text"
                value=""
                spellcheck="false"
                autocomplete="off"
            />
            <div id="below-input"></div>
        </div>
        <div id="explanation"></div>
        <p id="attribution">
            A
            <a href="https://github.com/jamespfennell/texcraft">Texcraft</a>
            project
        </p>

        <script type="module">
            import init, { hyphenate, explain } from "./pkg/hyphenate_wasm.js";

            const input = document.getElementById("word-input");
            const belowInput = document.getElementById("below-input");
            const explanationEl = document.getElementById("explanation");

            // I put some Jack Gilbert poems I like from Refusing Heaven into a text file
            // and then ran:
            // egrep -wo '[[:alnum:]]{6,}' tmp/gilbert.txt | tr '[:upper:]' '[:lower:]'  | sort -u
            const SUGGESTION_POOL = [
                "absurd",
                "afternoon",
                "against",
                "antelope",
                "anyone",
                "anything",
                "around",
                "asleep",
                "awareness",
                "beauty",
                "because",
                "before",
                "behind",
                "believe",
                "better",
                "blessed",
                "bodice",
                "bottom",
                "breakfast",
                "burning",
                "coming",
                "consequence",
                "cosmos",
                "desiring",
                "doorjamb",
                "dreaming",
                "duplication",
                "easter",
                "eleven",
                "endless",
                "enough",
                "everybody",
                "everyone",
                "exalted",
                "excess",
                "extravagantly",
                "fading",
                "failed",
                "failing",
                "flowers",
                "flying",
                "forgets",
                "garden",
                "gentleness",
                "greasy",
                "habitat",
                "happiness",
                "harvest",
                "helpless",
                "horror",
                "icarus",
                "implication",
                "incidentals",
                "infidelity",
                "inside",
                "island",
                "iteration",
                "itself",
                "kamakura",
                "listened",
                "little",
                "living",
                "loneliness",
                "manger",
                "marriage",
                "meaningless",
                "meanwhile",
                "merely",
                "miming",
                "mistake",
                "momentary",
                "morning",
                "mountain",
                "nights",
                "noodles",
                "nothing",
                "people",
                "perfection",
                "perish",
                "pertinence",
                "phenomenon",
                "physics",
                "powerful",
                "present",
                "pretty",
                "provence",
                "quickly",
                "recognize",
                "rhubarb",
                "season",
                "secretly",
                "shoulders",
                "showing",
                "simple",
                "singularity",
                "slight",
                "sometimes",
                "source",
                "spirit",
                "squirrels",
                "standing",
                "strangeness",
                "straps",
                "stubborn",
                "summer",
                "surrounded",
                "swimming",
                "temporary",
                "thought",
                "through",
                "tilted",
                "triumph",
                "uninflected",
                "universe",
                "vastness",
                "visible",
                "visitation",
                "wasteland",
                "watched",
                "watching",
                "without",
                "worked",
            ];

            function randomSuggestions() {
                const pool = [...SUGGESTION_POOL];
                for (let i = pool.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [pool[i], pool[j]] = [pool[j], pool[i]];
                }
                return pool.slice(0, 3);
            }

            function renderBelow(word) {
                if (word) {
                    belowInput.innerHTML = hyphenate(word)
                        .split("-")
                        .join('<span class="hyphen">-</span>');
                } else {
                    const words = randomSuggestions();
                    belowInput.innerHTML =
                        '<div class="suggestions-row">' +
                        words
                            .map(
                                (w) =>
                                    `<button class="suggestion-chip">${w}</button>`,
                            )
                            .join("") +
                        "</div>";
                    belowInput
                        .querySelectorAll(".suggestion-chip")
                        .forEach((chip) => {
                            chip.addEventListener("click", () => {
                                const w = chip.textContent;
                                input.value = w;
                                history.replaceState(null, "", `/${w}`);
                                renderBelow(w);
                                renderExplanation(w);
                            });
                        });
                }
            }

            function renderExplanation(word) {
                if (!word) {
                    explanationEl.innerHTML = "";
                    return;
                }

                let data;
                try {
                    data = JSON.parse(explain(word));
                } catch {
                    explanationEl.innerHTML = "";
                    return;
                }

                const chars = [...data.word];
                const n = chars.length;
                if (n === 0) {
                    explanationEl.innerHTML = "";
                    return;
                }

                // Filter patterns where all scores are 0 (match but contribute nothing).
                const patterns = data.patterns.filter((p) =>
                    p.scores.some((s) => s !== 0),
                );

                // 2n+3 columns: start-dot | score | char | score | char | ... | score | end-dot
                // then a gap col and a pattern-text col on the right.
                const numCols = 2 * n + 3;
                const patternTextCol = numCols + 2; // after a 1.5rem gap col
                const colTemplate = [
                    ...Array.from({ length: numCols }, (_, i) =>
                        i % 2 === 1 ? "2ch" : "max-content",
                    ),
                    "1.5rem",
                    "max-content",
                ].join(" ");
                // Column helpers (1-indexed CSS grid columns):
                //   start dot   → col 1
                //   score pos i → col 2*i+2
                //   char pos i  → col 2*i+3
                //   end dot     → col 2*n+3
                //   pattern text → col patternTextCol

                const grid = document.createElement("div");
                grid.className = "exp-grid";
                grid.style.gridTemplateColumns = colTemplate;

                let nextRow = 1;

                function addCell(row, col, text, cls) {
                    const el = document.createElement("div");
                    el.className = cls;
                    el.style.gridRow = row;
                    el.style.gridColumn = col;
                    if (text) el.textContent = text;
                    grid.appendChild(el);
                }

                function patternText(p) {
                    let t = p.start_of_word ? "." : "";
                    const pChars = [...p.chars];
                    for (let i = 0; i < p.scores.length; i++) {
                        if (p.scores[i] !== 0) t += String(p.scores[i]);
                        if (i < pChars.length) t += pChars[i];
                    }
                    if (p.end_of_word) t += ".";
                    return t;
                }

                function addLink(row, col, text, cls, href) {
                    const el = document.createElement("a");
                    el.className = cls;
                    el.style.gridRow = row;
                    el.style.gridColumn = col;
                    el.textContent = text;
                    el.href = href;
                    el.target = "_blank";
                    el.rel = "noopener noreferrer";
                    grid.appendChild(el);
                }

                function addLabel(row, text) {
                    const el = document.createElement("div");
                    el.className = "exp-label";
                    el.style.gridRow = row;
                    el.textContent = text;
                    grid.appendChild(el);
                }

                function addSeparator(row) {
                    const el = document.createElement("div");
                    el.className = "exp-sep";
                    el.style.gridRow = row;
                    el.style.gridColumn = "1 / -1";
                    grid.appendChild(el);
                }

                const box = document.createElement("div");
                box.className = "exp-box";

                const heading = document.createElement("div");
                heading.className = "exp-heading";
                heading.textContent = "how it works";
                box.appendChild(heading);

                const desc = document.createElement("p");
                desc.className = "exp-description";
                const patternsLink = document.createElement("a");
                patternsLink.href =
                    "https://github.com/hyphenation/tex-hyphen/blob/5684c0f51c0b81133db2efbe60a408b4155a3ff5/hyph-utf8/tex/generic/hyph-utf8/patterns/tex/hyph-en-us.tex";
                patternsLink.target = "_blank";
                patternsLink.rel = "noopener noreferrer";
                patternsLink.textContent =
                    "TeX’s American English patterns file";
                desc.append(
                    "The Liang hyphenation algorithm ",
                    "was developed in the 1980s for the TeX typesetting system. ",
                    "hyphenate.dev uses a new implementation of the algorithm with ",
                    patternsLink,
                    " and gives the same result as TeX.",
                );
                box.appendChild(desc);
                box.appendChild(grid);

                // Word row
                addLabel(nextRow++, "start with the word");
                addCell(nextRow, 1, "·", "exp-dot");
                for (let i = 0; i < n; i++) {
                    addCell(nextRow, 2 * i + 3, chars[i], "exp-word-char");
                }
                addCell(nextRow, 2 * n + 3, "·", "exp-dot");
                nextRow++;

                addSeparator(nextRow++);
                addLabel(nextRow++, "find matching patterns");

                // Pattern rows: score at col 2*(offset+i)+2, char at col 2*(offset+i)+3
                for (const p of patterns) {
                    const row = nextRow++;
                    const pChars = [...p.chars];
                    if (p.start_of_word) addCell(row, 1, "·", "exp-dot");
                    for (let i = 0; i < p.scores.length; i++) {
                        const score = p.scores[i];
                        if (score !== 0) {
                            const col = 2 * (p.offset + i) + 2;
                            addCell(
                                row,
                                col,
                                String(score),
                                `exp-score ${score % 2 !== 0 ? "exp-score-break" : "exp-score-nobreak"}`,
                            );
                        }
                    }
                    for (let i = 0; i < pChars.length; i++) {
                        const col = 2 * (p.offset + i) + 3;
                        addCell(row, col, pChars[i], "exp-pattern-char");
                    }
                    if (p.end_of_word) addCell(row, 2 * n + 3, "·", "exp-dot");
                    const pt = patternText(p);
                    const searchUrl = `https://github.com/search?q=repo%3Ahyphenation%2Ftex-hyphen%20path%3Ahyph-utf8%2Ftex%2Fgeneric%2Fhyph-utf8%2Fpatterns%2Ftex%2Fhyph-en-us.tex%20${encodeURIComponent(pt)}&type=code`;
                    addLink(
                        row,
                        patternTextCol,
                        pt,
                        "exp-pattern-text",
                        searchUrl,
                    );
                }

                addSeparator(nextRow++);
                addLabel(nextRow++, "pick the largest score");

                // Aggregate scores row
                for (let i = 0; i < data.aggregate_scores.length; i++) {
                    const score = data.aggregate_scores[i];
                    if (score !== 0) {
                        const col = 2 * i + 2;
                        addCell(
                            nextRow,
                            col,
                            String(score),
                            `exp-agg-score ${score % 2 !== 0 ? "exp-score-break" : "exp-score-nobreak"}`,
                        );
                    }
                }
                nextRow++;

                addSeparator(nextRow++);
                addLabel(nextRow++, "hyphenate odd scores");

                // Hyphenated word row: chars in char columns, hyphens in score columns at break points
                addCell(nextRow, 1, "·", "exp-dot");
                for (let i = 0; i < n; i++) {
                    addCell(nextRow, 2 * i + 3, chars[i], "exp-word-char");
                }
                for (let i = 0; i < data.aggregate_scores.length; i++) {
                    if (data.aggregate_scores[i] % 2 !== 0) {
                        addCell(nextRow, 2 * i + 2, "-", "exp-hyphen");
                    }
                }
                addCell(nextRow, 2 * n + 3, "·", "exp-dot");

                explanationEl.innerHTML = "";
                explanationEl.appendChild(box);
            }

            await init();

            const pathWord = window.location.pathname.slice(1).trim();
            if (pathWord) {
                input.value = pathWord;
            }

            document.querySelector("h1").addEventListener("click", () => {
                input.value = "";
                history.replaceState(null, "", "/");
                renderBelow("");
                renderExplanation("");
            });

            renderBelow(input.value.trim());
            renderExplanation(input.value.trim());

            input.addEventListener("input", () => {
                const word = input.value.trim();
                history.replaceState(null, "", word ? `/${word}` : "/");
                renderBelow(word);
                renderExplanation(word);
            });
        </script>
    </body>
</html>
