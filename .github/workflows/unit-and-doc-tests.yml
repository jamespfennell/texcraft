name: Unit and doc tests

on:
  workflow_call:
    inputs:
      os:
        type: string
        required: true

jobs:
  unit-and-doc-tests:
    runs-on: ${{ inputs.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0

      - name: Run the tests
        run: cargo test

      - name: Build the binaries
        # The list can be regenerated by running `cargo run --bin blahblahblah
        # and then copying all of the targets from the error message.
        # The fuzz test targets need to be excluded.
        run: cargo build
          --bin box
          --bin dvitools
          --bin hyphenate
          --bin pltotf
          --bin randtex
          --bin texcraft
          --bin texlang-all-errors
          --bin tfmtools
          --bin tftopl
