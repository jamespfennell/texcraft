name: play.texcraft.dev

on:
  workflow_call:
    inputs:
      push_to_registry:
        type: boolean
        required: true

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: sites/play.texcraft.dev/Dockerfile
          load: true
          push: false
          tags: jamespfennell/play.texcraft.dev:latest

      - name: Start server
        run: docker run -d -p 8080:8080 jamespfennell/play.texcraft.dev:latest --memory

      - name: Wait for server to be ready
        run: timeout 30 bash -c 'until curl -sf http://localhost:8080; do sleep 1; done'

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install test dependencies
        run: npm install puppeteer
        working-directory: sites/play.texcraft.dev

      - name: Run smoke test
        run: node smoke.test.js
        working-directory: sites/play.texcraft.dev

      - name: Log in to Docker Hub
        if: inputs.push_to_registry
        uses: docker/login-action@v3
        with:
          username: jamespfennell
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push to Docker Hub
        if: inputs.push_to_registry
        run: docker push jamespfennell/play.texcraft.dev:latest
