name: knuthplass.dev

on:
  workflow_call:
    inputs:
      push_to_registry:
        type: boolean
        required: true

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: sites/knuthplass.dev/Dockerfile
          load: true
          push: false
          tags: jamespfennell/knuthplass.dev:latest

      - name: Start server
        run: docker run -d -p 8767:80 jamespfennell/knuthplass.dev:latest

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install test dependencies
        run: npm install
        working-directory: sites/knuthplass.dev

      - name: Run smoke test
        run: npm test
        working-directory: sites/knuthplass.dev

      - name: Log in to Docker Hub
        if: inputs.push_to_registry
        uses: docker/login-action@v3
        with:
          username: jamespfennell
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push to Docker Hub
        if: inputs.push_to_registry
        run: docker push jamespfennell/knuthplass.dev:latest
